name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

# Only one concurrent deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://campbellctrl.xyz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}

      # GitHub Pages serves 404.html for unknown routes — copy index.html so
      # the React router handles all paths correctly (replaces vercel.json rewrite)
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # A CNAME file in the gh-pages branch root tells GitHub Pages to serve
      # the entire site (including preview subdirectories) under this custom
      # domain. Preview deployments intentionally omit their own CNAME so they
      # are served at campbell-ctrlers.github.io/campbell-ctrl/pr-preview/…
      # instead. GitHub Pages source must be set to the gh-pages branch in
      # repository Settings → Pages for all deployments to work correctly.
      - name: Write CNAME
        run: echo "campbellctrl.xyz" > dist/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          # keep_files preserves preview subdirectories written by the
          # Preview Deployment workflow on every production push
          keep_files: true
