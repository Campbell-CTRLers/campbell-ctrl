name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches-ignore:
      - main

# NOTE: Preview deployments require GitHub Pages to be configured to serve
# from the gh-pages branch (Settings → Pages → Source: Deploy from a branch,
# branch: gh-pages). The production workflow writes a CNAME file to the root
# of that branch so the live site stays at campbellctrl.xyz. Preview
# deployments intentionally omit CNAME so they are served at the github.io
# subdomain: campbell-ctrlers.github.io/campbell-ctrl/pr-preview/<n>/

permissions:
  contents: write
  pull-requests: write
  deployments: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PR preview ──────────────────────────────────────────────────────────────
  preview-pr:
    name: PR Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: ${{ steps.preview.outputs.deployment-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Skip the build step entirely when the PR is being closed/merged
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build
        if: github.event.action != 'closed'
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}

      # Copy index.html → 404.html so the React router handles all sub-paths
      - name: Copy index.html to 404.html for SPA routing
        if: github.event.action != 'closed'
        run: cp dist/index.html dist/404.html

      - name: Deploy PR preview
        id: preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          deploy-repository: ${{ github.repository }}

  # ── Branch preview ──────────────────────────────────────────────────────────
  preview-branch:
    name: Branch Preview
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: Preview
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/branch/${{ steps.slug.outputs.branch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}

      # Copy index.html → 404.html so the React router handles all sub-paths
      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # Sanitise the branch name into a safe directory/URL segment:
      # replace any character that is not alphanumeric or a hyphen with a
      # hyphen, then collapse consecutive hyphens and strip leading/trailing
      # hyphens. This covers slashes, dots, @, #, spaces, etc.
      - name: Compute branch slug
        id: slug
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
          echo "branch=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Deploy branch preview
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          destination_dir: branch/${{ steps.slug.outputs.branch }}
          keep_files: true
