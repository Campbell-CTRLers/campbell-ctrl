# Lint workflow: runs ESLint and Stylelint on every push/PR to main.
# ESLint results are uploaded to GitHub Advanced Security (Code Scanning)
# as SARIF so findings appear in the Security tab and on PR diff views.

name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to Code Scanning
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (SARIF output)
        run: |
          npx eslint . \
            -f @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif
        continue-on-error: true   # upload SARIF even when there are findings

      - name: Upload ESLint results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true

  stylelint:
    name: Stylelint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Stylelint
        run: npm run lint:css
